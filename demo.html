<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG Sprite System</title>
  <style>
    /* Grundlegendes Box-Modell */
    html { box-sizing: border-box; }
    *, *:before, *:after { box-sizing: inherit; }

    body {
      margin: 0;
      padding: 3rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 1.125rem;
      text-align: center;
      background-color: #f4f7f6;
      color: #333;
    }

    h1 {
      font-weight: 100;
      margin-bottom: 1.5em;
    }

    h1 small {
      display: block;
      font-size: 0.4em;
      margin-top: 0.5rem;
      color: #666;
    }

    /* Versteckt den Sprite-Container komplett vom Layout */
    .sprite-sheet {
      display: none;
    }

    /* Styling für die angezeigten Icons */
    .icon {
      width: 50px;
      height: 50px;
      margin: 15px;
      /*currentColor sorgt dafür, dass das Icon die Textfarbe übernimmt */
      color: #2d3436; 
      transition: all 0.3s ease;
      cursor: pointer;
    }

    /* Interaktionseffekte */
    .icon:hover {
      color: #0984e3;
      transform: scale(1.2) rotate(5deg);
    }

    /* Container für die Icons */
    .icon-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 600px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <h1>
    SVG Icon Sprite
    <small>Effiziente Icon-Verwaltung mit einem einzigen Sprite</small>
  </h1>

  <!-- SVG Sprite (Definitionen) -->
  <svg class="sprite-sheet" xmlns="http://www.w3.org/2000/svg">
    <symbol id="message-circle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"></path>
    </symbol>
    
    <symbol id="message-square" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 17a2 2 0 0 1-2 2H6.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 2 21.286V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"></path>
    </symbol>
    
    <symbol id="phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233 14 14 0 0 0 6.392 6.384"></path>
    </symbol>
    <symbol id="heart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"></path>
    </symbol>
    <symbol id="map-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"></path>
      <circle cx="12" cy="10" r="3"></circle>
    </symbol>
    <symbol id="scale" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3v18"></path>
      <path d="m19 8 3 8a5 5 0 0 1-6 0zV7"></path>
      <path d="M3 7h1a17 17 0 0 0 8-2 17 17 0 0 0 8 2h1"></path>
      <path d="m5 8 3 8a5 5 0 0 1-6 0zV7"></path>
      <path d="M7 21h10"></path>
    </symbol>
    <symbol id="shield-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"></path>
      <path d="m9 12 2 2 4-4"></path>
    </symbol>
    <symbol id="map" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z"></path>
      <path d="M15 5.764v15"></path>
      <path d="M9 3.236v15"></path>
    </symbol>
    <symbol id="tv" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m17 2-5 5-5-5"></path>
      <rect width="20" height="15" x="2" y="7" rx="2"></rect>
    </symbol>
    <symbol id="wifi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20h.01"></path>
      <path d="M2 8.82a15 15 0 0 1 20 0"></path>
      <path d="M5 12.859a10 10 0 0 1 14 0"></path>
      <path d="M8.5 16.429a5 5 0 0 1 7 0"></path>
    </symbol>
    <symbol id="utensils" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"></path>
      <path d="M7 2v20"></path>
      <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"></path>
    </symbol>
    <symbol id="car" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"></path>
      <circle cx="7" cy="17" r="2"></circle>
      <path d="M9 17h6"></path>
      <circle cx="17" cy="17" r="2"></circle>
    </symbol>
  </svg>
  <div class="icon-grid">
    <svg class="icon"><use xlink:href="#message-circle"></use></svg>
    <svg class="icon"><use xlink:href="#message-square"></use></svg>
    <svg class="icon"><use xlink:href="#phone"></use></svg>
    <svg class="icon"><use xlink:href="#heart"></use></svg>
    <svg class="icon"><use xlink:href="#map-pin"></use></svg>
    <svg class="icon"><use xlink:href="#scale"></use></svg>
    <svg class="icon"><use xlink:href="#shield-check"></use></svg>
    <svg class="icon"><use xlink:href="#map"></use></svg>
    <svg class="icon"><use xlink:href="#tv"></use></svg>
    <svg class="icon"><use xlink:href="#wifi"></use></svg>
    <svg class="icon"><use xlink:href="#utensils"></use></svg>
    <svg class="icon"><use xlink:href="#car"></use></svg>
  </div>
</body>
</html>
