<!doctype html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H1 Style Demo - Gästehaus 22</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .demo-container {
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 3rem 2rem;
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .logo-placeholder {
            width: 80px;
            height: 80px;
            background: #222;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }

        h1 {
            margin: 1rem 0;
            transition: all 0.2s ease;
        }

        .subtitle {
            color: #666;
            margin-bottom: 2rem;
        }

        .style-name {
            display: inline-block;
            background: #f0f0f0;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #666;
            margin-top: 1rem;
        }

        /* Style Dropdown */
        .style-dropdown {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: white;
            border-radius: 48px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.875rem;
            z-index: 1000;
            border: 1px solid #e5e5e5;
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.95);
        }

        .style-dropdown label {
            font-weight: 500;
            color: #333;
        }

        .style-dropdown select {
            padding: 0.5rem 1.5rem 0.5rem 0.75rem;
            border-radius: 40px;
            border: 1px solid #ddd;
            background: white;
            font-family: inherit;
            font-size: 0.875rem;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        .style-dropdown select:hover {
            border-color: #222;
        }

        .style-dropdown select:focus {
            border-color: #222;
            box-shadow: 0 0 0 2px rgba(34, 34, 34, 0.1);
        }

        @media (max-width: 640px) {
            .style-dropdown {
                bottom: 1rem;
                right: 1rem;
                padding: 0.375rem 0.75rem;
            }
            
            .style-dropdown select {
                padding: 0.375rem 1.25rem 0.375rem 0.625rem;
                font-size: 0.75rem;
            }
            
            .demo-container {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <div class="logo-placeholder">
            <span>Gästehaus<br>22</span>
        </div>
        <h1 id="demo-headline">Monteurzimmer in Asten</h1>
        <div class="subtitle">
            <span lang="de">Praktisch. Sauber. Günstig.</span>
        </div>
        <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eee;">
            <p style="font-size: 0.875rem; color: #888;">
                ⚡ Wähle unten rechts einen Stil aus
            </p>
        </div>
        <div class="style-name" id="style-name-display">
            Aktueller Stil: —
        </div>
    </div>

    <div class="style-dropdown">
        <label for="style-select">🎨 Schriftstil:</label>
        <select id="style-select">
            <option value="default">Standard (System-UI)</option>
            <option value="clean-bold">Clean & Bold</option>
            <option value="industrial">Industrial Style</option>
            <option value="premium">Premium / Edel</option>
            <option value="dynamic">Dynamisch / Modern</option>
            <option value="compact">Schmal & Kompakt</option>
            <option value="german-touch">Deutscher Touch</option>
            <option value="soft-modern">Soft & Modern</option>
            <option value="statement">Statement / Impact</option>
        </select>
    </div>

    <script>
        const headline = document.getElementById('demo-headline');
        const styleSelect = document.getElementById('style-select');
        const styleNameDisplay = document.getElementById('style-name-display');

        // Mapping der Style-Namen für die Anzeige
        const styleNames = {
            default: "Standard (System-UI)",
            'clean-bold': "Clean & Bold",
            industrial: "Industrial Style",
            premium: "Premium / Edel",
            dynamic: "Dynamisch / Modern",
            compact: "Schmal & Kompakt",
            'german-touch': "Deutscher Touch",
            'soft-modern': "Soft & Modern",
            statement: "Statement / Impact"
        };

        // Alle CSS-Stile als vorbereitete Regeln
        const styles = {
            default: `
                font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                font-weight: 800;
                text-transform: uppercase;
                letter-spacing: -0.02em;
                font-size: clamp(1.5rem, 5vw, 2.2rem);
                color: inherit;
                background: none;
                -webkit-background-clip: unset;
                border: none;
                padding: 0;
                font-style: normal;
            `,
            
            'clean-bold': `
                font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                font-weight: 800;
                font-size: clamp(1.8rem, 6vw, 2.8rem);
                letter-spacing: -0.01em;
                line-height: 1.2;
                text-transform: none;
                color: inherit;
            `,
            
            industrial: `
                font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                font-size: clamp(1.6rem, 5vw, 2.4rem);
                color: inherit;
            `,
            
            premium: `
                font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                font-weight: 600;
                letter-spacing: -0.01em;
                font-size: clamp(1.8rem, 5vw, 2.5rem);
                color: #1a1a1a;
                text-shadow: 2px 2px 4px rgba(0,0,0,0.02);
                text-transform: none;
            `,
            
            dynamic: `
                font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                font-weight: 800;
                font-style: italic;
                letter-spacing: -0.02em;
                background: linear-gradient(135deg, #1a1a1a 0%, #4a4a4a 100%);
                background-clip: text;
                -webkit-background-clip: text;
                color: transparent;
                text-transform: none;
            `,
            
            compact: `
                font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                font-weight: 700;
                letter-spacing: -0.03em;
                font-size: clamp(1.6rem, 5vw, 2.2rem);
                line-height: 1.1;
                text-transform: none;
                color: inherit;
            `,
            
            'german-touch': `
                font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                font-weight: 600;
                letter-spacing: -0.005em;
                text-transform: uppercase;
                border-bottom: 3px solid #222;
                display: inline-block;
                padding-bottom: 0.25rem;
                color: inherit;
            `,
            
            'soft-modern': `
                font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                font-weight: 650;
                letter-spacing: -0.01em;
                font-size: clamp(1.8rem, 5vw, 2.4rem);
                opacity: 0.92;
                text-transform: none;
                color: inherit;
            `,
            
            statement: `
                font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                font-weight: 900;
                text-transform: uppercase;
                letter-spacing: -0.02em;
                font-size: clamp(2rem, 7vw, 3.2rem);
                line-height: 1.1;
                word-break: break-word;
                color: inherit;
            `
        };

        // Funktion zum Anwenden eines Stils
        function applyStyle(styleKey) {
            // Entferne alle Inline-Stile
            headline.style.cssText = '';
            // Entferne eventuell gesetzte Klassen
            headline.className = '';
            
            const cssRules = styles[styleKey];
            if (cssRules) {
                // Parse die CSS-Regeln und wende sie einzeln an
                cssRules.split(';').forEach(rule => {
                    const [property, value] = rule.split(':');
                    if (property && value) {
                        const prop = property.trim();
                        const val = value.trim();
                        if (prop && val) {
                            headline.style[prop] = val;
                        }
                    }
                });
            }
            
            // Update Anzeige
            styleNameDisplay.textContent = `Aktueller Stil: ${styleNames[styleKey] || styleKey}`;
        }

        // Event-Listener für Dropdown-Änderungen
        styleSelect.addEventListener('change', (e) => {
            applyStyle(e.target.value);
        });

        // Standard-Stil beim Laden anwenden
        applyStyle('default');
    </script>
</body>
</html>
