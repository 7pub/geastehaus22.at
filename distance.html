<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entfernungsrechner</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #result {
            margin-top: 1.5rem;
            font-weight: bold;
            color: #333;
        }
        .error {
            color: #dc3545;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Wie weit ist es?</h2>
    <p>Berechne die Distanz zum Eiffelturm (Beispielziel)</p>
    
    <button id="distBtn">Entfernung berechnen</button>
    
    <div id="result"></div>
</div>

<script>
    // Beispiel-Zielkoordinaten (Eiffelturm, Paris)
    const TARGET_COORDS = {
        lat: 48.8584,
        lon: 2.2945
    };

    const btn = document.getElementById('distBtn');
    const resultDiv = document.getElementById('result');

    /**
     * Berechnet die Luftlinie zwischen zwei Punkten (Haversine-Formel)
     */
    function calculateHaversine(lat1, lon1, lat2, lon2) {
        const R = 6371; // Erdradius in Kilometern
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        
        const a = 
            Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
        
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c; 
    }

    function updateUI(message, isError = false) {
        resultDiv.innerHTML = isError ? `<span class="error">${message}</span>` : message;
    }

    btn.addEventListener('click', () => {
        if (!navigator.geolocation) {
            updateUI("Geolocation wird von deinem Browser nicht unterstützt.", true);
            return;
        }

        btn.disabled = true;
        updateUI("Standort wird ermittelt...");

        navigator.geolocation.getCurrentPosition(
            (position) => {
                const userLat = position.coords.latitude;
                const userLon = position.coords.longitude;

                const distance = calculateHaversine(
                    userLat, 
                    userLon, 
                    TARGET_COORDS.lat, 
                    TARGET_COORDS.lon
                );

                updateUI(`Es sind ca. <strong>${distance.toFixed(2)} km</strong> (Luftlinie) bis zum Ziel.`);
                btn.disabled = false;
            },
            (error) => {
                btn.disabled = false;
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        updateUI("Zugriff auf Standort verweigert.", true);
                        break;
                    case error.POSITION_UNAVAILABLE:
                        updateUI("Standortinformationen sind nicht verfügbar.", true);
                        break;
                    case error.TIMEOUT:
                        updateUI("Zeitüberschreitung bei der Standortabfrage.", true);
                        break;
                    default:
                        updateUI("Ein unbekannter Fehler ist aufgetreten.", true);
                        break;
                }
            },
            {
                enableHighAccuracy: true,
                timeout: 5000,
                maximumAge: 0
            }
        );
    });
</script>

</body>
</html>
